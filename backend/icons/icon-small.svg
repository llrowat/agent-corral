<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Two chunky legs -->
  <line x1="80" y1="208" x2="64" y2="248" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
  <line x1="176" y1="208" x2="192" y2="248" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>

  <!-- Head/face - terminal screen -->
  <rect x="20" y="32" width="216" height="180" rx="24" ry="24" fill="#1a1a1a"/>

  <!-- > as eye/expression -->
  <polyline points="52,92 100,132 52,172" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- _ as mouth -->
  <line x1="120" y1="172" x2="196" y2="172" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
</svg>
